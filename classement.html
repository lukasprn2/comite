<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classements 2026</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f0f2f5;
}

/* HEADER (IDENTIQUE STYLE CALENDRIER) */
header {
    background: linear-gradient(135deg, #1d3557, #457b9d);
    color:white;
    text-align:center;
    padding:30px 20px;
}

header h1 {
    margin:0;
    font-size:32px;
}

/* CONTAINER */
.container {
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
}

/* CARD STYLE */
.card {
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* TITRE */
.card h2 {
    margin-top:0;
    color:#1d3557;
}

/* SEARCH */
.search {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:10px 0 15px;
}

/* TABLE */
.table-wrapper {
    overflow:auto;
    max-height:400px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
}

th {
    background:#457b9d;
    color:white;
    position:sticky;
    top:0;
    cursor:pointer;
}

tr:nth-child(even) {
    background:#f8f9fa;
}

tr:hover {
    background:#e6f0ff;
}

</style>
</head>

<body>

<header>
<h1>Classements 2026</h1>
</header>

<div class="container">

<!-- SECTION TEMPLATE -->
<div class="card">
<h2>Seniors</h2>
<input class="search" placeholder="Rechercher..." onkeyup="filter('senior', this.value)">
<div class="table-wrapper">
<table id="senior"></table>
</div>
</div>

<div class="card">
<h2>Clubs</h2>
<input class="search" placeholder="Rechercher..." onkeyup="filter('clubs', this.value)">
<div class="table-wrapper">
<table id="clubs"></table>
</div>
</div>

<div class="card">
<h2>Vétérans</h2>
<input class="search" placeholder="Rechercher..." onkeyup="filter('vet', this.value)">
<div class="table-wrapper">
<table id="vet"></table>
</div>
</div>

<div class="card">
<h2>Féminines</h2>
<input class="search" placeholder="Rechercher..." onkeyup="filter('fem', this.value)">
<div class="table-wrapper">
<table id="fem"></table>
</div>
</div>

<div class="card">
<h2>Jeunes</h2>
<input class="search" placeholder="Rechercher..." onkeyup="filter('jeunes', this.value)">
<div class="table-wrapper">
<table id="jeunes"></table>
</div>
</div>

</div>

<script>

/* LOAD EXCEL */
function loadExcel(file, id) {
    fetch(file)
    .then(r => r.arrayBuffer())
    .then(data => {
        let wb = XLSX.read(data);
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet);

        renderTable(json, id);
    });
}

/* RENDER */
function renderTable(data, id) {
    let table = document.getElementById(id);
    if (!data.length) return;

    let headers = Object.keys(data[0]);

    let html = "<thead><tr>";
    headers.forEach(h => {
        html += `<th onclick="sort('${id}','${h}')">${h}</th>`;
    });
    html += "</tr></thead><tbody>";

    data.forEach(row => {
        html += "<tr>";
        headers.forEach(h => {
            html += `<td>${row[h] || ""}</td>`;
        });
        html += "</tr>";
    });

    html += "</tbody>";
    table.innerHTML = html;
}

/* SEARCH */
function filter(id, value) {
    let rows = document.querySelectorAll(`#${id} tbody tr`);
    value = value.toLowerCase();

    rows.forEach(r => {
        r.style.display = r.innerText.toLowerCase().includes(value) ? "" : "none";
    });
}

/* SORT */
function sort(id, col) {
    let table = document.getElementById(id);
    let rows = Array.from(table.querySelectorAll("tbody tr"));
    let index = Array.from(table.querySelectorAll("th")).findIndex(th => th.innerText === col);

    rows.sort((a,b) => {
        let A = a.children[index].innerText;
        let B = b.children[index].innerText;
        return isNaN(A) ? A.localeCompare(B) : B - A;
    });

    let tbody = table.querySelector("tbody");
    tbody.innerHTML = "";
    rows.forEach(r => tbody.appendChild(r));
}

/* TES FICHIERS */
loadExcel("point-senior-21042026.xlsx", "senior");
loadExcel("point-clubs-21042026.xlsx", "clubs");
loadExcel("point-vet-21042026.xlsx", "vet");
loadExcel("point-fem-21042026.xlsx", "fem");
loadExcel("point-jeunes-19032026.xlsx", "jeunes");

</script>

</body>
</html>
