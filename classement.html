<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classements 2026</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#eef1f5;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    padding:30px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

header h1 {
    margin:0;
    font-size:32px;
}

/* CONTAINER */
.container {
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

/* CARDS */
.section {
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.section:hover {
    transform:translateY(-3px);
}

/* TITRES */
.section h2 {
    margin-top:0;
    color:#2a5298;
}

/* SEARCH */
input {
    width:100%;
    padding:12px;
    margin:10px 0 15px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* TABLE */
.table-container {
    max-height:400px;
    overflow:auto;
    border-radius:10px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    text-align:left;
}

th {
    background:#2a5298;
    color:white;
    position:sticky;
    top:0;
    cursor:pointer;
}

tr:nth-child(even) {
    background:#f7f9fc;
}

tr:hover {
    background:#e3ecff;
}
</style>
</head>

<body>

<header>
    <h1>Classements 2026</h1>
</header>

<div class="container">

<div class="section">
<h2>Seniors</h2>
<input type="text" placeholder="Rechercher..." onkeyup="filterTable('senior', this.value)">
<div class="table-container">
<table id="senior"></table>
</div>
</div>

<div class="section">
<h2>Clubs</h2>
<input type="text" placeholder="Rechercher..." onkeyup="filterTable('clubs', this.value)">
<div class="table-container">
<table id="clubs"></table>
</div>
</div>

<div class="section">
<h2>Vétérans</h2>
<input type="text" placeholder="Rechercher..." onkeyup="filterTable('vet', this.value)">
<div class="table-container">
<table id="vet"></table>
</div>
</div>

<div class="section">
<h2>Féminines</h2>
<input type="text" placeholder="Rechercher..." onkeyup="filterTable('fem', this.value)">
<div class="table-container">
<table id="fem"></table>
</div>
</div>

<div class="section">
<h2>Jeunes</h2>
<input type="text" placeholder="Rechercher..." onkeyup="filterTable('jeunes', this.value)">
<div class="table-container">
<table id="jeunes"></table>
</div>
</div>

</div>

<script>
function loadExcel(file, tableId) {
    fetch(file)
    .then(res => res.arrayBuffer())
    .then(data => {
        let wb = XLSX.read(data);
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(sheet);

        displayTable(json, tableId);
    });
}

function displayTable(data, id) {
    let table = document.getElementById(id);
    if (!data.length) return;

    let headers = Object.keys(data[0]);

    let html = "<thead><tr>";
    headers.forEach(h => {
        html += `<th onclick="sortTable('${id}', '${h}')">${h}</th>`;
    });
    html += "</tr></thead><tbody>";

    data.forEach(row => {
        html += "<tr>";
        headers.forEach(h => {
            html += `<td>${row[h] || ""}</td>`;
        });
        html += "</tr>";
    });

    html += "</tbody>";
    table.innerHTML = html;
}

function filterTable(id, value) {
    let rows = document.querySelectorAll(`#${id} tbody tr`);
    value = value.toLowerCase();

    rows.forEach(r => {
        r.style.display = r.innerText.toLowerCase().includes(value) ? "" : "none";
    });
}

function sortTable(id, col) {
    let table = document.getElementById(id);
    let rows = Array.from(table.querySelectorAll("tbody tr"));
    let index = Array.from(table.querySelectorAll("th")).findIndex(th => th.innerText === col);

    rows.sort((a, b) => {
        let A = a.children[index].innerText;
        let B = b.children[index].innerText;
        return isNaN(A) ? A.localeCompare(B) : B - A;
    });

    let tbody = table.querySelector("tbody");
    tbody.innerHTML = "";
    rows.forEach(r => tbody.appendChild(r));
}

/* TES FICHIERS */
loadExcel("point-senior-21042026.xlsx", "senior");
loadExcel("point-clubs-21042026.xlsx", "clubs");
loadExcel("point-vet-21042026.xlsx", "vet");
loadExcel("point-fem-21042026.xlsx", "fem");
loadExcel("point-jeunes-19032026.xlsx", "jeunes");
</script>

</body>
</html>
